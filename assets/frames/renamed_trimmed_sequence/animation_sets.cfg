; Frame range syntax:
;   frames="0-7,12,15-18"
; Ranges are inclusive and use the sorted PNG order in this folder.
; Walk + aim templates below only include aim directions within 90 degrees
; of the walking direction. Opposite aim directions are intentionally omitted.
; Leave a section empty until you know which frames belong there.

[meta]
source_folder="res://assets/frames/renamed_trimmed_sequence"
output_path="res://assets/frames/renamed_trimmed_sequence/walk_aim_sets.tres"
default_fps=12.0

